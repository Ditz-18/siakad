    .peng-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--border-radius-lg); padding:18px 20px; cursor:pointer; transition:all var(--transition-base); display:flex; align-items:flex-start; gap:14px; }
    .peng-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .peng-icon { width:42px; height:42px; border-radius:var(--border-radius-sm); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .peng-title { font-size:0.9375rem; font-weight:700; color:var(--text-primary); margin-bottom:5px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; line-height:1.4; }
    .peng-excerpt { font-size:0.8125rem; color:var(--text-secondary); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-overflow:hidden; overflow:hidden; margin-bottom:8px; line-height:1.5; }
    .peng-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .dot-new-inline { width:7px; height:7px; background:var(--danger); border-radius:50%; display:inline-block; flex-shrink:0; }
  </style>

        <button class="filter-btn active" onclick="setFilter('Semua',this)">Semua</button>
        <button class="filter-btn" onclick="setFilter('Akademik',this)"><i class="fa-solid fa-graduation-cap"></i> Akademik</button>
        <button class="filter-btn" onclick="setFilter('Keuangan',this)"><i class="fa-solid fa-money-bill"></i> Keuangan</button>

<script>
(function() {
  const btnMore=document.getElementById('btn-more-menu'), overlay=document.getElementById('more-menu-overlay'), sheet=document.getElementById('more-menu-sheet');
  function openMore(){overlay.classList.add('open');sheet.classList.add('open');btnMore.classList.add('open');document.body.style.overflow='hidden';}
  function closeMore(){overlay.classList.remove('open');sheet.classList.remove('open');btnMore.classList.remove('open');document.body.style.overflow='';}
  btnMore?.addEventListener('click',function(e){e.stopPropagation();sheet.classList.contains('open')?closeMore():openMore();});
  overlay?.addEventListener('click',closeMore);
  let startY=0;
  sheet?.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;},{passive:true});
  sheet?.addEventListener('touchmove',function(e){if(e.touches[0].clientY-startY>60)closeMore();},{passive:true});
})();
</script>
<script>
const _s = JSON.parse(localStorage.getItem('siakad_user') || 'null');
if (!_s || _s.role !== 'dosen') window.location.href = '../auth/login.html';
const iconMap  = { Akademik:'fa-graduation-cap', Keuangan:'fa-money-bill', Umum:'fa-bullhorn' };
const bgMap    = { Akademik:'var(--info-bg)', Keuangan:'var(--warning-bg)', Umum:'var(--bg-tertiary)' };
const colorMap = { Akademik:'color:var(--info)', Keuangan:'color:var(--warning)', Umum:'color:var(--text-muted)' };
const badgeMap = { Akademik:'badge-info', Keuangan:'badge-warning', Umum:'badge-muted' };
let pengList = [];
let currentFilter = 'Semua';
async function loadPengumuman() {
  const params = {};
  if (currentFilter !== 'Semua') params.kategori = currentFilter;
  // Pengumuman dosen menggunakan endpoint mahasiswa (shared, filter target=Dosen/Semua)
  const r = await apiFetch('/mahasiswa/pengumuman' + (currentFilter !== 'Semua' ? '?kategori=' + currentFilter : ''));
  if (!r || !r.ok || !r.data) { showToast('danger','Error','Gagal memuat pengumuman'); return; }
  const result = r.data;
  pengList = (result.data?.data || result.data || []).filter(p =>
    p.target === 'Semua' || p.target === 'Dosen'
  );
  renderList();
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadPengumuman();
}
function renderList() {
  const container = document.getElementById('peng-list');
  if (!container) return;
  if (!pengList.length) {
    container.innerHTML = `<div class="empty-state"><h3>Tidak ada pengumuman</h3></div>`;
    return;
  }
  container.innerHTML = pengList.map(p => `
    <div class="peng-card" onclick="bukaDetail(${p.id})">
      <div class="peng-icon" style="background:${bgMap[p.kategori]}">
        <i class="fa-solid ${iconMap[p.kategori]}" style="${colorMap[p.kategori]}"></i>
      </div>
      <div style="flex:1;min-width:0">
        <div class="peng-title">${p.baru?'<span class="dot-new-inline"></span>':''}${escHTML(p.judul)}${p.penting?'<span class="badge badge-warning" style="font-size:0.62rem">Penting</span>':''}</div>
        <div class="peng-excerpt">${escHTML(p.isi)}</div>
        <div class="peng-meta">
          <span class="badge ${badgeMap[p.kategori]}" style="font-size:0.65rem">${p.kategori}</span>
          <span style="font-size:0.775rem;color:var(--text-muted)">${formatTanggal(p.created_at,'pendek')}</span>
        </div>
      </div>
    </div>`).join('');
}
function bukaDetail(id) {
  const p = pengList.find(x => x.id === id); if (!p) return;
  document.getElementById('modal-peng-judul').textContent = p.judul;
  document.getElementById('modal-peng-isi').textContent   = p.isi;
  document.getElementById('modal-peng-meta').innerHTML    = `
    <span class="badge ${badgeMap[p.kategori]}">${p.kategori}</span>
    ${p.penting?'<span class="badge badge-warning">Penting</span>':''}
    <span style="font-size:0.8rem;color:var(--text-muted)">${formatTanggal(p.created_at,'panjang')}</span>`;
  showModal('modal-detail-peng');
}
loadPengumuman();
</script>
