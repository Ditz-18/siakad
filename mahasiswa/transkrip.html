  <style>
    .profile-header {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    /* Row wrapper — di desktop transparan, isi langsung flex */
    .profile-header-row1 {
      display: contents; /* children langsung jadi flex children dari .profile-header */
    }
    .profile-avatar-lg {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: white;
      flex-shrink: 0;
      border: 3px solid rgba(27,58,107,0.15);
    }
    .profile-info {
      flex: 1;
      min-width: 0;
    }
    .profile-info h2 {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--text-primary);
      word-break: break-word;
    }
    .profile-info p { font-size: 0.875rem; color: var(--text-secondary); margin-top: 4px; }
    .profile-info-grid {
      display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px;
    }
    .profile-info-item { font-size: 0.8125rem; }
    .profile-info-item label { color: var(--text-muted); margin-right: 4px; }
    .profile-info-item strong { color: var(--text-primary); }
    .ipk-display {
      margin-left: auto;
      text-align: right;
      flex-shrink: 0;
    }
    .ipk-display .num {
      font-family: var(--font-display);
      font-size: 2.5rem; font-weight: 700;
      color: var(--navy); line-height: 1;
    }
    .ipk-display .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

    /* Mobile fix: layout 2 baris — atas: avatar+nama, IPK pojok kanan; bawah: angkatan+fakultas */
    @media (max-width: 600px) {
      .profile-header {
        padding: 16px;
        gap: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      /* Baris 1: avatar + nama + IPK sejajar */
      .profile-header-row1 {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .profile-avatar-lg {
        width: 52px; height: 52px;
        font-size: 1.3rem;
        flex-shrink: 0;
      }

      /* Nama & NIM/Prodi ambil sisa ruang, IPK di kanan */
      .profile-info {
        flex: 1;
        min-width: 0;
      }
      .profile-info h2 {
        font-size: 0.9375rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .profile-info p {
        font-size: 0.8rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .ipk-display {
        margin-left: 0;
        text-align: right;
        flex-shrink: 0;
      }
      .ipk-display .num { font-size: 1.7rem; }
      .ipk-display .lbl { font-size: 0.68rem; }

      /* Baris 2: angkatan & fakultas */
      .profile-info-grid {
        margin-top: 12px;
        gap: 6px 20px;
      }
    }

    /* Accordion semester */
    .semester-block {
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .semester-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: background var(--transition-fast);
      user-select: none;
    }
    .semester-header:hover { background: var(--bg-tertiary); }
    .semester-num {
      width: 30px; height: 30px;
      background: var(--navy);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .semester-header h3 { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); flex: 1; }
    .semester-chevron { color: var(--text-muted); font-size: 0.8rem; transition: transform 0.3s; }
    .semester-block.open .semester-chevron { transform: rotate(180deg); }
    .semester-body { display: none; }
    .semester-block.open .semester-body { display: block; }

    .grade-a   { background:rgba(26,122,66,0.12);  color:var(--success); font-weight:700; }
    .grade-b   { background:rgba(23,96,160,0.12);  color:var(--info);    font-weight:700; }
    .grade-c   { background:rgba(196,125,10,0.12); color:var(--warning); font-weight:700; }
    .grade-d   { background:rgba(190,51,40,0.12);  color:var(--danger);  font-weight:700; }
    .grade-e   { background:var(--danger-bg);       color:var(--danger);  font-weight:700; }
  </style>

<script>

const _s = JSON.parse(localStorage.getItem('siakad_user') || 'null');
if (!_s || _s.role !== 'mahasiswa') window.location.href = '../auth/login.html';

async function loadTranskrip() {
  const [profilRes, khsRes] = await Promise.all([
    MahasiswaAPI.profil(),
    MahasiswaAPI.khs()
  ]);

  if (profilRes && profilRes.ok) {
    const m = profilRes.data.data;
    const fields = {
      'tr-nama':    m.nama,
      'tr-nim':     m.nim,
      'tr-prodi':   m.program_studi?.nama,
      'tr-angkatan':m.angkatan,
      'tr-status':  m.status,
    };
    Object.entries(fields).forEach(([id,val]) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val || '—';
    });
  }

  if (khsRes && khsRes.ok) {
    const d = khsRes.data.data;
    const ipkEl = document.getElementById('tr-ipk') || document.querySelector('[id*="ipk"]');
    if (ipkEl) ipkEl.textContent = d.ipk ?? '0.00';
    const sksEl = document.getElementById('tr-sks') || document.querySelector('[id*="sks"]');
    if (sksEl) sksEl.textContent = d.total_sks ?? '0';
    renderTranskrip(d.per_semester || []);
  }
}

function renderTranskrip(list) {
  const tbody = document.getElementById('tbody-transkrip') || document.querySelector('tbody');
  if (!tbody) return;
  let no = 1;
  tbody.innerHTML = list.flatMap(s =>
    (s.nilai || []).map(n => `
      <tr>
        <td style="text-align:center">${no++}</td>
        <td class="font-mono" style="font-size:0.8rem">${n.kelas?.mata_kuliah?.kode || '—'}</td>
        <td>${escHTML(n.kelas?.mata_kuliah?.nama || '—')}</td>
        <td style="text-align:center">${n.kelas?.mata_kuliah?.sks ?? '—'}</td>
        <td style="text-align:center">${escHTML(s.semester?.nama || '—')}</td>
        <td style="text-align:center;font-weight:700">${n.nilai_akhir ?? '—'}</td>
        <td style="text-align:center"><span class="badge badge-primary">${n.grade || '—'}</span></td>
        <td style="text-align:center">${n.bobot ?? '—'}</td>
        <td><span class="badge ${n.status==='Lulus'?'badge-success':'badge-danger'}">${n.status || '—'}</span></td>
      </tr>`)
  ).join('');
}

function eksporTranskrip() {
  showToast('info','Ekspor','Fitur ekspor transkrip PDF segera tersedia');
}

loadTranskrip();

</script>
