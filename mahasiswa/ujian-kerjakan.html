<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kerjakan Ujian — SIAKAD STAI DILWA</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive-patch.css">
  <link rel="stylesheet" href="../assets/css/print.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: var(--bg-secondary); }

    /* ── Header ujian ── */
    .ujian-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy);
      color: #fff;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .ujian-header-title { font-size: 1rem; font-weight: 600; flex: 1; }
    .ujian-timer {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px; padding: 6px 14px;
      font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums;
      min-width: 90px; justify-content: center;
    }
    .ujian-timer.warning { background: #f59e0b; color: #000; animation: timerPulse 1s infinite; }
    .ujian-timer.danger  { background: #ef4444; color: #fff; animation: timerPulse 0.5s infinite; }
    @keyframes timerPulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    /* ── Soal area ── */
    .soal-container {
      max-width: 780px; margin: 0 auto;
      padding: 20px 16px 100px;
    }
    .soal-card {
      background: var(--bg-primary);
      border-radius: 14px;
      border: 1px solid var(--border-color);
      padding: 24px;
      margin-bottom: 0;
    }
    .soal-nomor {
      font-size: 0.8rem; font-weight: 600;
      color: var(--navy); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .soal-ragu-badge {
      background: #f59e0b22; color: #d97706;
      border-radius: 6px; padding: 2px 10px;
      font-size: 0.75rem;
    }
    .soal-pertanyaan {
      font-size: 1rem; line-height: 1.65;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    .pilihan-list { display: flex; flex-direction: column; gap: 10px; }
    .pilihan-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid var(--border-color);
      cursor: pointer;
      transition: all 0.18s;
    }
    .pilihan-item:hover { border-color: var(--navy); background: var(--bg-secondary); }
    .pilihan-item.dipilih {
      border-color: var(--navy);
      background: #1a3a6b12;
    }
    .pilihan-key {
      min-width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    .pilihan-item.dipilih .pilihan-key {
      background: var(--navy); color: #fff; border-color: var(--navy);
    }
    .pilihan-teks { line-height: 1.5; font-size: 0.95rem; }

    /* ── Navigasi bawah soal ── */
    .soal-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: center;
      z-index: 90;
    }
    .soal-nav .btn { flex: 1; }
    .soal-counter {
      text-align: center;
      font-size: 0.85rem; color: var(--text-secondary);
      min-width: 80px;
    }
    .soal-counter strong { display: block; font-size: 1.1rem; color: var(--text-primary); }

    /* ── Panel navigasi soal (grid) ── */
    .nav-panel {
      position: fixed; top: 0; right: -300px; bottom: 0;
      width: 280px;
      background: var(--bg-primary);
      border-left: 1px solid var(--border-color);
      z-index: 200;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 16px;
    }
    .nav-panel.open { right: 0; }
    .nav-panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 195;
      display: none;
    }
    .nav-panel-overlay.open { display: block; }
    .soal-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; margin-top: 12px;
    }
    .soal-grid-btn {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .soal-grid-btn.dijawab   { background: var(--navy); color: #fff; border-color: var(--navy); }
    .soal-grid-btn.ragu      { background: #f59e0b; color: #000; border-color: #f59e0b; }
    .soal-grid-btn.aktif     { outline: 3px solid var(--navy); outline-offset: 2px; }

    /* ── Loading / hasil ── */
    .loading-screen, .hasil-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center;
      padding: 32px 16px;
    }
    .hasil-nilai {
      font-size: 4rem; font-weight: 800;
      color: var(--navy); line-height: 1;
    }
    .hasil-label { font-size: 1rem; color: var(--text-secondary); margin-top: 4px; }

    /* ── Pelanggaran warning ── */
    .pelanggaran-toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: #ef4444; color: #fff;
      border-radius: 10px; padding: 10px 20px;
      font-weight: 600; z-index: 500;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .pelanggaran-toast.show { display: block; animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity:0; top:50px; } to { opacity:1; top:70px; } }
  </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--navy);margin-bottom:16px"></i>
  <p>Memuat soal ujian...</p>
</div>

<div id="hasil-screen" class="hasil-screen" style="display:none">
  <i class="fa-solid fa-circle-check fa-3x" style="color:#22c55e;margin-bottom:16px"></i>
  <div class="hasil-nilai" id="hasil-nilai">—</div>
  <div class="hasil-label">Nilai Akhir</div>
  <p style="margin-top:16px;color:var(--text-secondary)" id="hasil-detail"></p>
  <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <a href="ujian.html" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Kembali ke Daftar Ujian</a>
  </div>
</div>

<div id="ujian-screen" style="display:none">
  <!-- Header -->
  <div class="ujian-header">
    <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
      <button class="btn btn-ghost btn-icon btn-sm" style="color:#fff" onclick="toggleNavPanel()">
        <i class="fa-solid fa-th"></i>
      </button>
      <div class="ujian-header-title" id="ujian-nama-header">Ujian</div>
    </div>
    <div class="ujian-timer" id="ujian-timer">
      <i class="fa-solid fa-clock"></i>
      <span id="timer-text">--:--</span>
    </div>
  </div>

  <!-- Pelanggaran warning -->
  <div class="pelanggaran-toast" id="pelanggaran-toast"></div>

  <!-- Soal -->
  <div class="soal-container">
    <div class="soal-card" id="soal-card">
      <div class="soal-nomor">
        <span id="soal-nomor-label">Soal 1</span>
        <span class="soal-ragu-badge" id="soal-ragu-badge" style="display:none">
          <i class="fa-solid fa-question-circle"></i> Ragu-ragu
        </span>
      </div>
      <div class="soal-pertanyaan" id="soal-pertanyaan"></div>
      <div class="pilihan-list" id="pilihan-list"></div>
    </div>
  </div>

  <!-- Nav bawah -->
  <div class="soal-nav">
    <button class="btn btn-ghost btn-sm" id="btn-prev" onclick="navigasiSoal(-1)">
      <i class="fa-solid fa-chevron-left"></i> Sebelumnya
    </button>
    <div class="soal-counter">
      <strong id="counter-text">1/1</strong>
      <span>soal</span>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-ragu" onclick="toggleRagu()">
      <i class="fa-solid fa-question-circle"></i> Ragu
    </button>
    <button class="btn btn-primary btn-sm" id="btn-next" onclick="navigasiSoal(1)">
      Berikutnya <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>

<!-- Panel navigasi soal -->
<div class="nav-panel-overlay" id="nav-panel-overlay" onclick="toggleNavPanel()"></div>
<div class="nav-panel" id="nav-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <strong>Navigasi Soal</strong>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="toggleNavPanel()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div style="display:flex;gap:8px;font-size:0.75rem;color:var(--text-secondary);margin-bottom:8px;flex-wrap:wrap">
    <span><span style="display:inline-block;width:12px;height:12px;background:var(--navy);border-radius:3px"></span> Dijawab</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:#f59e0b;border-radius:3px"></span> Ragu</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:var(--bg-secondary);border:2px solid var(--border-color);border-radius:3px"></span> Belum</span>
  </div>
  <div class="soal-grid" id="soal-grid"></div>

  <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color)">
    <div id="ringkasan-jawaban" style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:14px"></div>
    <button class="btn btn-primary" style="width:100%" onclick="konfirmasiKumpul()">
      <i class="fa-solid fa-paper-plane"></i> Kumpulkan Ujian
    </button>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/utils.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/main.js"></script>

<script>
const _s = JSON.parse(localStorage.getItem('siakad_user') || 'null');
if (!_s || _s.role !== 'mahasiswa') window.location.href = '../auth/login.html';

// State
const ujianId   = new URLSearchParams(location.search).get('id');
let soalList    = [];
let indexAktif  = 0;
let sisaDetik   = 0;
let timerInterval = null;
let autoSaveQueue = {};

if (!ujianId) {
  window.location.href = 'ujian.html';
}

// ── INIT ────────────────────────────────────────────
async function initUjian() {
  if (!ujianId) return;

  const res = await MahasiswaAPI.soalUjian(ujianId);

  if (!res || !res.ok) {
    document.getElementById('loading-screen').innerHTML = `
      <i class="fa-solid fa-circle-xmark fa-2x" style="color:#ef4444;margin-bottom:16px"></i>
      <p>${res?.data?.message || 'Gagal memuat soal ujian.'}</p>
      <a href="ujian.html" class="btn btn-ghost" style="margin-top:12px">Kembali</a>
    `;
    return;
  }

  const d = res.data.data;
  soalList = d.soal || [];
  sisaDetik = d.sisa_detik ?? (d.ujian?.durasi * 60);

  document.getElementById('ujian-nama-header').textContent = d.ujian?.nama || 'Ujian';
  document.getElementById('loading-screen').style.display  = 'none';
  document.getElementById('ujian-screen').style.display    = '';

  renderSoal(0);
  renderGrid();
  startTimer();
  initVisibilityGuard();
}

// ── RENDER SOAL ─────────────────────────────────────
function renderSoal(idx) {
  if (!soalList.length) return;
  indexAktif = idx;

  const s    = soalList[idx];
  const total = soalList.length;

  document.getElementById('soal-nomor-label').textContent = `Soal ${s.nomor} dari ${total}`;
  document.getElementById('soal-pertanyaan').textContent  = s.pertanyaan;
  document.getElementById('counter-text').textContent     = `${idx + 1}/${total}`;

  // Ragu badge
  const raguBadge = document.getElementById('soal-ragu-badge');
  raguBadge.style.display = s.ragu ? '' : 'none';

  // Pilihan
  const pilihanList = document.getElementById('pilihan-list');
  if (s.tipe === 'pilihan_ganda' && s.pilihan?.length) {
    pilihanList.innerHTML = s.pilihan.map(p => `
      <div class="pilihan-item ${s.jawaban_saya === p.key ? 'dipilih' : ''}"
           onclick="pilihJawaban('${s.id}','${p.key}',this)">
        <div class="pilihan-key">${p.key}</div>
        <div class="pilihan-teks">${escHTML(p.teks)}</div>
      </div>
    `).join('');
  } else {
    pilihanList.innerHTML = `
      <textarea class="form-control" rows="5" placeholder="Tulis jawaban essay di sini..."
        onchange="pilihJawaban('${s.id}',this.value,null)"
        style="resize:vertical">${s.jawaban_saya || ''}</textarea>
    `;
  }

  // Nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent =
    idx === total - 1 ? 'Kumpulkan' : 'Berikutnya ›';
  document.getElementById('btn-next').onclick =
    idx === total - 1 ? konfirmasiKumpul : () => navigasiSoal(1);

  // Highlight grid
  document.querySelectorAll('.soal-grid-btn').forEach((b,i) => {
    b.classList.toggle('aktif', i === idx);
  });
}

// ── PILIH JAWABAN ────────────────────────────────────
function pilihJawaban(soalId, jawaban, el) {
  const idx = soalList.findIndex(s => String(s.id) === String(soalId));
  if (idx === -1) return;

  soalList[idx].jawaban_saya = jawaban;

  // Update UI
  if (el) {
    document.querySelectorAll('.pilihan-item').forEach(p => p.classList.remove('dipilih'));
    el.classList.add('dipilih');
  }

  renderGrid();
  autoSaveJawaban(soalId, jawaban, soalList[idx].ragu ?? false);
}

// ── AUTO SAVE ────────────────────────────────────────
function autoSaveJawaban(soalId, jawaban, ragu) {
  clearTimeout(autoSaveQueue[soalId]);
  autoSaveQueue[soalId] = setTimeout(async () => {
    await MahasiswaAPI.jawabSoal(ujianId, soalId, jawaban, ragu);
  }, 800); // debounce 800ms
}

// ── TOGGLE RAGU ─────────────────────────────────────
function toggleRagu() {
  const s = soalList[indexAktif];
  if (!s) return;
  s.ragu = !s.ragu;
  renderSoal(indexAktif);
  renderGrid();
  autoSaveJawaban(s.id, s.jawaban_saya, s.ragu);
}

// ── NAVIGASI ─────────────────────────────────────────
function navigasiSoal(delta) {
  const next = indexAktif + delta;
  if (next < 0 || next >= soalList.length) return;
  renderSoal(next);
}

// ── GRID PANEL ───────────────────────────────────────
function renderGrid() {
  const dijawab = soalList.filter(s => s.jawaban_saya).length;
  const ragu    = soalList.filter(s => s.ragu).length;

  document.getElementById('ringkasan-jawaban').innerHTML =
    `Dijawab: <strong>${dijawab}/${soalList.length}</strong> &nbsp;|&nbsp; Ragu: <strong>${ragu}</strong>`;

  document.getElementById('soal-grid').innerHTML = soalList.map((s, i) => `
    <button class="soal-grid-btn ${s.ragu ? 'ragu' : s.jawaban_saya ? 'dijawab' : ''} ${i === indexAktif ? 'aktif' : ''}"
            onclick="gotoSoal(${i})">${s.nomor}</button>
  `).join('');
}

function gotoSoal(idx) {
  renderSoal(idx);
  toggleNavPanel();
}

function toggleNavPanel() {
  document.getElementById('nav-panel').classList.toggle('open');
  document.getElementById('nav-panel-overlay').classList.toggle('open');
  renderGrid();
}

// ── TIMER ────────────────────────────────────────────
function startTimer() {
  renderTimer();
  timerInterval = setInterval(() => {
    sisaDetik--;
    renderTimer();
    if (sisaDetik <= 0) {
      clearInterval(timerInterval);
      showToast('warning', 'Waktu Habis', 'Ujian dikumpulkan otomatis');
      kumpulkanUjian();
    }
  }, 1000);
}

function renderTimer() {
  const menit  = Math.floor(Math.abs(sisaDetik) / 60);
  const detik  = Math.abs(sisaDetik) % 60;
  const teks   = `${String(menit).padStart(2,'0')}:${String(detik).padStart(2,'0')}`;
  const el     = document.getElementById('timer-text');
  const wrap   = document.getElementById('ujian-timer');
  if (el) el.textContent = teks;
  wrap.classList.toggle('warning', sisaDetik > 0 && sisaDetik <= 300);
  wrap.classList.toggle('danger',  sisaDetik > 0 && sisaDetik <= 60);
}

// ── KUMPULKAN ────────────────────────────────────────
function konfirmasiKumpul() {
  const dijawab  = soalList.filter(s => s.jawaban_saya).length;
  const belum    = soalList.length - dijawab;
  const ragu     = soalList.filter(s => s.ragu).length;

  let msg = `Kamu akan mengumpulkan ujian ini.\n`;
  if (belum > 0) msg += `⚠ ${belum} soal belum dijawab.\n`;
  if (ragu  > 0) msg += `? ${ragu} soal ditandai ragu-ragu.\n`;
  msg += `\nYakin ingin mengumpulkan?`;

  konfirmasi(msg, kumpulkanUjian);
}

async function kumpulkanUjian() {
  clearInterval(timerInterval);
  document.getElementById('ujian-screen').style.display  = 'none';
  document.getElementById('loading-screen').style.display = '';
  document.getElementById('loading-screen').innerHTML = `
    <i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--navy);margin-bottom:16px"></i>
    <p>Mengumpulkan jawaban...</p>
  `;

  const res = await MahasiswaAPI.submitUjian(ujianId);

  if (res && res.ok) {
    const d = res.data.data;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('hasil-screen').style.display   = '';
    document.getElementById('hasil-nilai').textContent       = d.nilai ?? '—';
    document.getElementById('hasil-detail').textContent =
      `Jawaban benar: ${d.benar ?? '—'} dari ${d.total ?? '—'} soal`;
  } else {
    showToast('danger', 'Gagal', res?.data?.message || 'Gagal mengumpulkan ujian');
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('ujian-screen').style.display   = '';
    startTimer();
  }
}

// ── ANTI CHEAT: Visibility Guard ─────────────────────
function initVisibilityGuard() {
  document.addEventListener('visibilitychange', async () => {
    if (document.hidden) {
      const res = await MahasiswaAPI.laporPelanggaran(ujianId, 'Pindah tab / minimize browser');
      const toast = document.getElementById('pelanggaran-toast');
      if (res && res.ok) {
        const d = res.data;
        if (d.dibatalkan) {
          showToast('danger', 'Ujian Dibatalkan', 'Melebihi batas pelanggaran');
          setTimeout(() => { window.location.href = 'ujian.html'; }, 2000);
        } else {
          toast.textContent = `⚠ Pelanggaran ${d.pelanggaran}/${d.pelanggaran + d.sisa_izin} — jangan pindah tab!`;
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 4000);
        }
      }
    }
  });
}

// ── Escape HTML helper ───────────────────────────────
function escHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Init
initUjian();
</script>
</body>
</html>
